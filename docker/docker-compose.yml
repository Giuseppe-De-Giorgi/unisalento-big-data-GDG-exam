services:
  postgres:
    image: postgres:16
    container_name: ebook_postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ebook_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../relazionale/sql:/docker-entrypoint-initdb.d

volumes:
  postgres_data: